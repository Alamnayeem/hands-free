name: hands_free_phone_controller
description: A production-quality system-wide hands-free Android controller using Eye Tracking, Voice Commands, and Text Commands.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  camera: ^0.10.5+2
  permission_handler: ^11.0.1
  flutter_local_notifications: ^16.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  speech_to_text: ^6.1.1
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/camera_click.wav
